<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esta colmena no existe — Apiyauya</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%9D%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--miel:#d98e2b;--miel-clara:#f4c869;--miel-oscura:#8a4b12;--verde-oscuro:#22301e;--ease:cubic-bezier(.16,.8,.3,1);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito Sans',sans-serif;min-height:100svh;display:flex;align-items:center;justify-content:center;
    text-align:center;color:#fff;position:relative;overflow:hidden;padding:24px;}
  .bg{position:absolute;inset:0;z-index:0;}
  .bg img{width:100%;height:100%;object-fit:cover;}
  body::after{content:'';position:absolute;inset:0;z-index:1;
    background:linear-gradient(to top,rgba(16,22,10,.9),rgba(16,22,10,.55)),radial-gradient(ellipse 60% 50% at 70% 10%,rgba(217,142,43,.3),transparent 60%);}
  .grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.06;mix-blend-mode:soft-light;}
  .inner{position:relative;z-index:3;max-width:560px;}
  .code{font-family:'Fraunces',serif;font-size:clamp(4rem,16vw,9rem);color:var(--miel-clara);line-height:1;text-shadow:0 4px 40px rgba(0,0,0,.4);}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.5rem,4vw,2.3rem);margin:8px 0 16px;}
  h1 em{font-style:italic;color:var(--miel-clara);}
  p{color:rgba(255,255,255,.85);font-size:1.05rem;margin-bottom:32px;}
  .home{display:inline-flex;align-items:center;gap:10px;background:var(--miel-oscura);color:#fff;
    padding:16px 32px;border-radius:100px;font-weight:800;transition:transform .25s var(--ease),background .25s;
    box-shadow:0 14px 34px -12px rgba(138,75,18,.7);}
  .home:hover{transform:translateY(-3px);background:#a0591a;}
  a{text-decoration:none;}
  .word{display:inline-block;opacity:0;filter:blur(12px);transform:translateY(30px);animation:bin .7s var(--ease) forwards;}
  @keyframes bin{to{opacity:1;filter:blur(0);transform:none;}}
  @media (prefers-reduced-motion:reduce){.word{animation:none;opacity:1;filter:none;transform:none;}}
</style>
</head>
<body>
  <div class="bg"><img src="assets/hero-santuario.webp" alt="Rancho Apiyauya al amanecer"></div>
  <svg class="grain" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect width="100%" height="100%" filter="url(#g)"/>
  </svg>
  <div class="inner">
    <div class="code">404</div>
    <h1 id="t"></h1>
    <p>La página que buscas voló a otra flor. Volvamos al santuario.</p>
    <a href="/" class="home">← Regresar al inicio</a>
  </div>
  <script>
    const words = "Esta colmena no existe.".split(' ');
    document.getElementById('t').innerHTML = words.map((w,i)=>
      `<span class="word" style="animation-delay:${i*0.12}s">${w}${i<words.length-1?'&nbsp;':''}</span>`).join('');
  </script>
</body>
</html>
